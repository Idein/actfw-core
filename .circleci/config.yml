version: 2.1

references:
  image-tags: &image-tags
    - "python:3.9-bullseye"
    - "python:3.11-bookworm"

commands:
  install-uv:
    steps:
      - run:
          name: Install uv
          environment:
            UV_VERSION: "0.11.26"
          command: |
            curl -LsSf "https://astral.sh/uv/${UV_VERSION}/install.sh" | sh
            echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$BASH_ENV"
            # Use the Docker image's "python" instead of letting uv download its own Python.
            echo 'export UV_PYTHON=python' >> "$BASH_ENV"
  uv-sync:
    steps:
      - restore_cache:
          key: &cache-key-uv cache-uv-{{ .Environment.CIRCLE_JOB }}-{{ .Environment.CIRCLECI_CACHE_VERSION }}-{{ checksum "uv.lock" }}
      - run:
          name: uv sync
          command: |
            uv sync --frozen
      - save_cache:
          key: *cache-key-uv
          paths:
            - ".venv"

  prepare-github-writable-user:
    steps:
      - run:
          name: Configure git user
          command: |
            git config user.email "bot@idein.jp"
            git config user.name "ideinbot"
      - add_ssh_keys:
          fingerprints:
            - "38:6d:d2:4d:a5:65:d9:b9:87:cd:f5:cf:a3:d4:e5:d6"

jobs:
  lint:
    docker:
      - image: python:3.11-bookworm
        auth: &docker-hub-auth
          username: $DOCKER_USER
          password: $DOCKER_PASS
    steps:
      - checkout
      - install-uv
      - uv-sync
      - run:
          name: Lint
          command: make lint

  test:
    parameters:
      image-tag:
        type: string
    docker:
      - image: <<parameters.image-tag>>
        auth: *docker-hub-auth
    steps:
      - checkout
      - install-uv
      - uv-sync
      - run:
          name: Test
          command: make test
  test-with-up-to-date-dependencies:
    parameters:
      image-tag:
        type: string
    docker:
      - image: <<parameters.image-tag>>
        auth: *docker-hub-auth
    steps:
      - checkout
      - run:
          name: remove lock file to get up-to-date dependencies
          command: rm uv.lock
      - install-uv
      - run:
          name: uv sync
          command: uv sync
      - run:
          name: Test
          command: make test

  build-api-doc:
    docker:
      - image: idein/actcast-rpi-app-base:bookworm-1
        auth: *docker-hub-auth
    resource_class: arm.medium
    steps:
      - checkout
      - run:
          name: Install python
          command: |
            apt-get update
            apt-get install -y --no-install-recommends python-is-python3 curl
      - install-uv
      - run:
          name: uv sync with system site packages
          command: |
            uv venv --clear --system-site-packages
            uv sync --frozen
      - run:
          name: sphinx-build
          command: |
            # Use the venv directly to preserve --system-site-packages; `uv run` may recreate .venv without it.
            .venv/bin/sphinx-build docs build/sphinx/html
      - persist_to_workspace:
          root: build/sphinx
          paths:
            - html
      - store_artifacts: # for reviewers to check generated doc
          path: build/sphinx/html
          destination: html

  build-package:
    docker:
      - image: python:3.11-bookworm
        auth: *docker-hub-auth
    steps:
      - checkout
      - install-uv
      - run:
          name: Make wheel & sdist
          command: |
            # Ignore local source overrides so release artifacts are built only from publishable dependencies.
            uv build --no-sources
      - persist_to_workspace:
          root: .
          paths:
            - dist

  validate-version-with-tag:
    docker:
      - image: python:3.11-bookworm
        auth: *docker-hub-auth
    steps:
      - checkout
      - install-uv
      - uv-sync
      - run:
          name: Check if git tag name is appropriate for package version
          command: |
            TAG=$(echo ${CIRCLE_TAG} |sed -e 's/release-//')
            VERSION=$(uv run --frozen python -c 'from importlib.metadata import version; print(version("actfw-core"))')
            echo "Git tag: $TAG"
            echo "Package version: $VERSION"
            test "$VERSION" = "$TAG"

  deploy-api-doc:
    docker:
      - image: alpine/git
        auth: *docker-hub-auth
    steps:
      - checkout
      - run:
          name: checkout gh-pages branch
          command: git checkout gh-pages
      - attach_workspace:
          at: /tmp/workspace
      - run:
          name: Place doc contents in version directory (linked by `latest` symlink)
          command: |
            TAG=$(echo ${CIRCLE_TAG} |sed -e 's/release-//')
            rm -rf $TAG latest
            mkdir $TAG
            cp -rf /tmp/workspace/html/* $TAG/
            ln -s $TAG latest
      - prepare-github-writable-user
      - run:
          name: Deploy docs to gh-pages branch
          command: |
            git add .
            git commit -m '[skip ci] updates API doc'
            git push origin gh-pages

  deploy-package:
    docker:
      - image: python:3.11-bookworm
        auth: *docker-hub-auth
    steps:
      - checkout
      - install-uv
      - attach_workspace:
          at: /tmp/workspace
      - run:
          name: Publish wheel & sdist to PyPI
          command: |
            mv /tmp/workspace/dist .
            uv publish --token "$PYPI_API_TOKEN"

workflows:
  version: 2
  commit:
    jobs:
      - lint:
          context:
            - docker-hub-creds
      - test:
          context:
            - docker-hub-creds
          matrix:
            parameters:
              image-tag: *image-tags
      - build-api-doc:
          context:
            - docker-hub-creds
      - build-package:
          context:
            - docker-hub-creds
  release:
    jobs:
      - validate-version-with-tag:
          context:
            - docker-hub-creds
          filters: &release-filter
            tags:
              only: /^release-[0-9]+(\.[0-9]+){2}((a|b|rc)[0-9]+)?(.post[0-9])?(.dev[0-9])?$/
            branches:
              ignore: /.*/
      - build-api-doc:
          context:
            - docker-hub-creds
          requires:
            - validate-version-with-tag
          filters: *release-filter
      - build-package:
          context:
            - docker-hub-creds
          requires:
            - validate-version-with-tag
          filters: *release-filter
      - deploy-api-doc:
          context:
            - docker-hub-creds
          requires:
            - build-api-doc
          filters: *release-filter
      - deploy-package:
          context:
            - docker-hub-creds
          requires:
            - build-package
          filters: *release-filter
  nightly:
    triggers:
      - schedule:
          cron: "31 23 * * *" # in UTC
          filters:
            branches:
              only:
                - master
    jobs:
      - lint:
          context:
            - docker-hub-creds
      - test:
          context:
            - docker-hub-creds
          matrix:
            parameters:
              image-tag: *image-tags
      - test-with-up-to-date-dependencies:
          context:
            - docker-hub-creds
          matrix:
            parameters:
              image-tag: *image-tags
      - build-api-doc:
          context:
            - docker-hub-creds
      - build-package:
          context:
            - docker-hub-creds
